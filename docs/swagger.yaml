openapi: 3.0.0
info:
  title: E-ASY POS & WMS API
  description: Enterprise API for Order Management System and Third-Party Integrations
  version: 2.5.0
servers:
  - url: https://your-app.vercel.app/api
    description: Production Server
  - url: http://localhost:8000/api
    description: Local Development Server
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
security:
  - bearerAuth: []
paths:
  /pos/checkout:
    post:
      summary: Submit a new POS Transaction
      description: Create a new transaction, deducting stock and calculating taxes atomically.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - items
                - payment_method
              properties:
                customer_id:
                  type: integer
                  description: Optional ID of the customer (for member pricing)
                payment_method:
                  type: string
                  enum: [cash, transfer, qris, card]
                cash_amount:
                  type: number
                discount:
                  type: number
                tax_included:
                  type: boolean
                  default: true
                currency:
                  type: string
                  default: IDR
                exchange_rate:
                  type: number
                  default: 1
                items:
                  type: array
                  items:
                    type: object
                    required:
                      - product_id
                      - quantity
                    properties:
                      product_id:
                        type: integer
                      quantity:
                        type: integer
                      discount:
                        type: number
      responses:
        '200':
          description: Transaction created successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  invoice:
                    type: string
                  total:
                    type: number
                  change:
                    type: number
        '422':
          description: Validation error or insufficient stock
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
